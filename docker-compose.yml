version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: rcms-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rcms
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - rcms-network

  backend:
    build: ./backend
    container_name: rcms-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/rcms?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - db
    networks:
      - rcms-network

  frontend:
    build: ./frontend
    container_name: rcms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - rcms-network

networks:
  rcms-network:
    driver: bridge

volumes:
  db_data: