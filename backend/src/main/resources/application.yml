server:
  port: 8080

spring:
  application:
    name: B2BReceivablesAndCreditManagementSystem
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rcms?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    web:
      pageable:
        one-indexed-parameters: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: averylongandsecuresecretkeythatisatleast256bitslongforhs256555555555555555555555
  expiration: 3600000 # 1 hour in milliseconds

rcms:
  default-admin:
    username: ${RCMS_DEFAULT_ADMIN_USERNAME:admin}
    password: ${RCMS_DEFAULT_ADMIN_PASSWORD:admin}
