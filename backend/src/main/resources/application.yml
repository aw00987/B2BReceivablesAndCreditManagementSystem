server:
  port: 8080

spring:
  application:
    name: B2BReceivablesAndCreditManagementSystem
  datasource:
    url: jdbc:mysql://localhost:3306/rcms?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: 123456
